# BhashAI reverse proxy. Place in /etc/nginx/sites-available and symlink to sites-enabled.
# certbot --nginx will add the 443 server + cert lines.
server {
    listen 80;
    server_name _;

    # Large uploads: prefer presigned PUT direct to S3. This guards multipart fallback.
    client_max_body_size 100m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
